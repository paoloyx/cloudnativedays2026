apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: prod-database
  namespace: default
spec:
  backup:
    barmanObjectStore:
      data:
        compression: gzip
      destinationPath: s3://cnpg-backups/default/prod-database
      s3Credentials:
        accessKeyId:
          key: ACCESS_KEY_ID
          name: backup-s3-creds
        secretAccessKey:
          key: ACCESS_SECRET_KEY
          name: backup-s3-creds
      wal:
        compression: gzip
    retentionPolicy: 7d
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  instances: 3
  monitoring:
    enablePodMonitor: true
  postgresql:
    parameters:
      max_connections: '100'
      shared_buffers: 128MB
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  storage:
    size: 2Gi
