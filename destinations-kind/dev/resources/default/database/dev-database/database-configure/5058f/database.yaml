apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  labels:
    environment: dev
  name: dev-database
  namespace: default
spec:
  imageName: ghcr.io/cloudnative-pg/postgresql:15
  instances: 1
  postgresql:
    parameters:
      max_connections: '50'
      shared_buffers: 64MB
  storage:
    size: 10Gi
